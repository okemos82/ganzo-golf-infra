name: Terraform

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  TF_VAR_subscription_id:    ${{ secrets.ARM_SUBSCRIPTION_ID }}
  TF_VAR_db_admin_password:  ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
  TF_VAR_openai_api_key:     ${{ secrets.TF_VAR_OPENAI_API_KEY }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=ganzo-golf-tfstate-rg" \
            -backend-config="storage_account_name=ganzogolftfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=ganzo-golf.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    needs: plan
    runs-on: ubuntu-latest
    environment: production        # ← requires manual approval in GitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=ganzo-golf-tfstate-rg" \
            -backend-config="storage_account_name=ganzogolftfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=ganzo-golf.tfstate"

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
